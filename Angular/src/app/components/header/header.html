<head>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
</head>

<nav class="navbar navbar-expand-lg bg-light">
    <div class="container">
        <a class="navbar-brand logo-icon-style" 
        routerLink="/" 
        routerLinkActive="active"
        (click)="closeMenu()">
        <i class="bi bi-bag-check-fill"></i>
           <span>ShopEZ</span>
       
</a>
        <button
        class="navbar-toggler"
        type="button"
        (click)="toggleMenu()">
        <span class="navbar-toggler-icon"></span>

        </button>
        <!-- Menu-->
    <div  class="collapse navbar-collapse justify-content-end" id="navbarNav"
    [ngClass]="{'show':isOpen}">
      <div class="d-flex me-4 search-box">
        
        <input
          type="text"
          class="form-control me-2"
          placeholder="Search products..."
          [(ngModel)]="searchText"
          (keyup.enter)="searchProducts()">

        <button
          class="btn btn-dark"
          (click)="searchProducts()">

          <i class="bi bi-search"></i>

        </button>

    </div>
        
        <ul class="navbar-nav">
            <li class="nav-item mx-2">
                <a class="nav-link nav-custom" routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" (click)="closeMenu()">
                <i class="bi bi-house"></i>  
                <span>Home</span>
                </a>

            </li>
            <li class="nav-item mx-2">
              <a class="nav-link nav-custom" routerLink="/products" routerLinkActive="active"(click) = "closeMenu()">
                <i class="bi bi-box-seam"></i>
                <span>Products</span>
              </a>
            </li>

            <li class="nav-item mx-2">
               <a class="nav-link nav-custom" routerLink="/cart" routerLinkActive="active"(click)="closeMenu()">
                  <i class="bi bi-bag fs-5"></i>
                  <span>Bag</span>
               </a>
            </li>
       
        </ul>
          <div class="d-flex align-items-center gap-3">

        <!-- Show Login if NOT logged in -->
         @if (!isLoggedIn()) {
        <button 
                class="btn btn-primary"
                routerLink="/auth">
          Login
        </button>
      }

        <!-- Profile Dropdown -->
         @if (isLoggedIn()) {
        <div class="dropdown" >

          <button class="btn btn-light dropdown-toggle profile-btn"
                  data-bs-toggle="dropdown">
                  <i class="bi bi-person-circle me-1"></i>
             {{ user?.fullName || 'Profile' }}
          </button>

          <ul class="dropdown-menu dropdown-menu-end custom-dropdown">

            <li>
              <a class="dropdown-item"
                 routerLink="/profile"
                 (click)="closeMenu()">
                Profile
              </a>
            </li>

            <li>
              <a class="dropdown-item"
                 routerLink="/orders"
                 (click)="closeMenu()">
                Orders
              </a>
            </li>
        @if (isAdmin()) {
       <li>
         <a class="dropdown-item"
         routerLink="/admin/products">
        <i class="bi bi-gear me-2"></i>
        Admin Panel
       </a>
      </li>
  }

            <li><hr class="dropdown-divider"></li>

            <li>
              <button class="dropdown-item text-danger"
                      (click)="logout()">
                Logout
              </button>
            </li>

          </ul>
        </div>
      }

      </div>
  

    </div>
 </div>
</nav>
